name: Django Oscar CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    environment: test
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Debug env
      run: echo "SALES_EMAIL is set to [$SALES_EMAIL]"
      env:
        SALES_EMAIL: ${{ vars.SALES_EMAIL }}

    - name: Run Tests
      env:
        SECRET_KEY: ci-test-secret-key
        JWT_SECRET: ci-test-jwt-secret
        GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
        GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
        GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
        SALES_EMAIL: ${{ vars.SALES_EMAIL }}
        DEFAULT_FROM_EMAIL: ${{ vars.DEFAULT_FROM_EMAIL }}

      run: |
        python manage.py test apps.api.tests -v 2

  deploy:
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Push to production
      env:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        SSH_HOST: ${{ secrets.SSH_HOST }}
        SSH_USER: ${{ secrets.SSH_USER }}
        SSH_PORT: ${{ secrets.SSH_PORT }}
      run: |
        mkdir -p ~/.ssh
        echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
        git remote add production "ssh://${SSH_USER}@${SSH_HOST}:${SSH_PORT}/home/raghav/shop.birdsociety.sg.git"
        GIT_SSH_COMMAND="ssh -i ~/.ssh/deploy_key -p ${SSH_PORT}" git push production master --force
