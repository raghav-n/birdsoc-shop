<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName shop.birdsociety.sg

    ErrorLog ${APACHE_LOG_DIR}/shop.birdsociety.sg-error.log
    CustomLog ${APACHE_LOG_DIR}/shop.birdsociety.sg-access.log combined

    # WSGI config - Django catches anything not rewritten below
    WSGIPassAuthorization On
    WSGIApplicationGroup %{GLOBAL}
    WSGIDaemonProcess shop.birdsociety.sg processes=2 threads=25 python-home=/var/www/shop.birdsociety.sg/myenv3.12 python-path=/var/www/shop.birdsociety.sg/myenv3.12/shop
    WSGIProcessGroup shop.birdsociety.sg
    WSGIScriptAlias / /var/www/shop.birdsociety.sg/myenv3.12/shop/shop/wsgi.py

    # Django static and media
    Alias /robots.txt /var/www/shop.birdsociety.sg/myenv3.12/shop/static/robots.txt
    Alias /favicon.ico /var/www/shop.birdsociety.sg/myenv3.12/shop/static/favicon.ico
    Alias /static/ /var/www/shop.birdsociety.sg/myenv3.12/shop/static/
    Alias /media/ /var/www/shop.birdsociety.sg/myenv3.12/shop/media/
    # Frontend assets (Vite build output)
    Alias /assets/ /var/www/shop.birdsociety.sg/myenv3.12/shop/frontend/dist/assets/

    <Directory /var/www/shop.birdsociety.sg/myenv3.12/shop/shop>
        <Files wsgi.py>
	     Require all granted
        </Files>
    </Directory>

    <Directory /var/www/shop.birdsociety.sg/myenv3.12/shop/static>
        Require all granted
        Options -Indexes +FollowSymLinks
    </Directory>

    <Directory /var/www/shop.birdsociety.sg/myenv3.12/shop/media>
        Require all granted
        Options -Indexes +FollowSymLinks
    </Directory>

    <Directory /var/www/shop.birdsociety.sg/myenv3.12/shop/frontend/dist>
        Require all granted
        Options -Indexes +FollowSymLinks
    </Directory>

    RewriteEngine on

    # Block bots
    RewriteCond %{HTTP_USER_AGENT} (AhrefsBot|YandexBot|ag_dm_spider|scrapy|chimebot|GoogleDocs;\sapps-spreadsheets;) [NC]
    RewriteRule .* - [F,L]

    # Django paths - skip rewriting, let WSGIScriptAlias handle them
    RewriteCond %{REQUEST_URI} ^/api/ [OR]
    RewriteCond %{REQUEST_URI} ^/dashboard/ [OR]
    RewriteCond %{REQUEST_URI} ^/admin/ [OR]
    RewriteCond %{REQUEST_URI} ^/i18n/ [OR]
    RewriteCond %{REQUEST_URI} ^/static/ [OR]
    RewriteCond %{REQUEST_URI} ^/media/ [OR]
    RewriteCond %{REQUEST_URI} ^/assets/
    RewriteRule .* - [L]

    # If the request matches a real file in frontend dist, serve it directly
    RewriteCond /var/www/shop.birdsociety.sg/myenv3.12/shop/frontend/dist%{REQUEST_URI} -f
    RewriteRule ^(.*)$ /var/www/shop.birdsociety.sg/myenv3.12/shop/frontend/dist$1 [L]

    # Everything else: serve the SPA index.html (bypasses WSGI)
    RewriteRule .* /var/www/shop.birdsociety.sg/myenv3.12/shop/frontend/dist/index.html [L]

    SSLCertificateFile /etc/letsencrypt/live/shop.birdsociety.sg/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/shop.birdsociety.sg/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
