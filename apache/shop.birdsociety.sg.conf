<VirtualHost *:80>
    ServerName shop.birdsociety.sg

    ErrorLog ${APACHE_LOG_DIR}/shop.birdsociety.sg-error.log
    CustomLog ${APACHE_LOG_DIR}/shop.birdsociety.sg-access.log combined

    RewriteEngine on
    RewriteCond %{SERVER_NAME} =$HOST [OR]
    RewriteCond %{SERVER_NAME} =shop.birdsociety.sg
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>