<VirtualHost *:80>
    ServerName shop.birdsociety.sg

    ErrorLog ${APACHE_LOG_DIR}/shop.birdsociety.sg-error.log
    CustomLog ${APACHE_LOG_DIR}/shop.birdsociety.sg-access.log combined

    RewriteEngine on
    RewriteRule ^ https://shop.birdsociety.sg%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>