{% if traffic %}
    <link href="//maxcdn.bootstrapcdn.com/bootstrap/4.1.1/css/bootstrap.min.css" rel="stylesheet" id="bootstrap-css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"
            integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx"
            crossorigin="anonymous"></script>
    <style>
        div.text-center {
            width: 500px;
            height: 230px;

            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;

            margin: auto;
        }
    </style>

    <div class="page-wrap d-flex flex-row align-items-center">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-12 text-center bg-light p-5">

                    <div class="mb-4 lead">We're experiencing a high volume of traffic right now. Please try again in a
                        bit - we're sorry for the inconvenience.
                    </div>
                    <button class="btn btn-link refresh-button">Refresh</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        const refreshButton = document.querySelector('.refresh-button');

        const refreshPage = () => {
            location.reload();
        }

        refreshButton.addEventListener('click', refreshPage)
    </script>
{% elif sentry_event_id %}
    <script
            src="https://browser.sentry-cdn.com/6.13.3/bundle.min.js"
            integrity="sha384-sGMbmxgVprpEFMz6afNDyADd4Kav86v5Tvo2Y6w5t8tHUn1P1at3lCjN7IQo2c7E"
            crossorigin="anonymous"
    ></script>
    <script>
        window.onload = function () {
            Sentry.init({dsn: "https://4b93b14e81bc4b4ebdbfa79be9ac9e78@o1066695.ingest.sentry.io/6059605"});
            Sentry.showReportDialog({eventId: "{{ sentry_event_id }}"});
        }
    </script>
{% endif %}
