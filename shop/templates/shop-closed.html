{% load static %}

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BirdSoc SG Shop</title>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Libre Franklin:300,400,500,600,700">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Noto Sans:300,400,500,600,700">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.7.0/css/all.min.css"
      integrity="sha512-gRH0EcIcYBFkQTnbpO8k0WlsD20x5VzjhOA1Og8+ZUAhcMUCvd+APD35FJw3GzHAP3e+mP28YcDJxVr745loHw==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="{% static "css/theme.css" %}">
    <link rel="stylesheet" href="{% static "css/style.css" %}">
    <link rel="stylesheet" href="{% static "css/shop-closed.css" %}">
</head>
<body>
<div class="container-fluid d-flex align-items-center justify-content-center vh-100">
    <div class="form-container text-center">
        <h1>Sorry, our shop is closed at the moment</h1>
        <p class="mt-2">We'll be back soon! Enter your email below to be notified when we're back online.</p>

        <form id="notifyForm" action="" method="post" class="form-inline justify-content-center mt-2 mb-1">
            {% csrf_token %}
            <div class="form-group mx-3 mb-2">
                <label for="email" class="sr-only">Email</label>
                <input type="email" class="form-control" id="email" placeholder="Enter your email" name="email" required>
            </div>
            <button type="submit" class="btn mb-2">Notify me</button>
            <div class="loader" id="loader"></div>
        </form>

        <p id="confirmationMessage">You'll be notified when our shop reopens!</p>
        <p class="mb-0"><a href="https://birdsociety.sg/" class="mt-3 d-block">
            <strong>Check out our Society's homepage <i class="fas fa-external-link-alt"></i></strong>
        </a></p>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>
<script src="{% static "js/shop-closed.js" %}"></script>
</body>
</html>
