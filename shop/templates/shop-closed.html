{% load static %}

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Closed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static "css/theme.css" %}">
    <link rel="stylesheet" href="{% static "css/style.css" %}">
    <link rel="stylesheet" href="{% static "css/shop-closed.css" %}">
</head>
<body>
<div class="container-fluid d-flex align-items-center justify-content-center vh-100">
    <div class="row">
        <div class="text-center bg-white p-4 rounded shadow-lg">
            <h1>Sorry, our shop is closed at the moment</h1>
            <p class="mt-2">We'll be back soon! Enter your email below to be notified when we're back online.</p>
            <form action="#" method="post" class="form-inline justify-content-center mt-2 mb-1">
                {% csrf_token %}
                <div class="form-group mx-3 mb-2">
                    <label for="email" class="sr-only">Email</label>
                    <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
                </div>
                <button type="submit" class="btn btn-dark mb-2">Notify me</button>
            </form>
            <a href="https://birdsociety.sg/">Go to BirdSoc SG Home »</a>
        </div>
    </div>
</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>
</body>
</html>
