{% load static %}

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BirdSoc SG Shop</title>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Libre Franklin:300,400,500,600,700">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Noto Sans:300,400,500,600,700">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.7.0/css/all.min.css"
      integrity="sha512-gRH0EcIcYBFkQTnbpO8k0WlsD20x5VzjhOA1Og8+ZUAhcMUCvd+APD35FJw3GzHAP3e+mP28YcDJxVr745loHw==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="{% static "css/theme.css" %}">
    <link rel="stylesheet" href="{% static "css/style.css" %}">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            font-family: "Noto Sans", sans-serif;
            background: linear-gradient(135deg, #d38be5e0, #A8D79Fe0, #F4B183e0);
            background-size: 150% 150%;
            animation: gradientShift 6s ease-in-out infinite;
        }

        h1 span.s1 {
          color: #6e3979;
        }

        @keyframes gradientShift {
            0%, 25%, 100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        .form-container {
            max-width: 700px;
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            padding: 30px;
        }

        h1 {
            font-size: calc(2rem + 1vw);
            font-family: "Libre Franklin", sans-serif;
            line-height: 1;
            letter-spacing: calc(-0.015rem - 0.03vw);
            font-weight: 700;
        }

        p {
            font-size: calc(0.8rem + 0.35vw);
            color: #666;
        }
    </style>
</head>
<body>
<div class="container-fluid d-flex align-items-center justify-content-center vh-100">
    <div class="form-container row g-0 text-center">
        <h1><span class="s1">Don't miss out!</span> Our BirdSoc SG merch sale ends in 7 days.
</h1>
